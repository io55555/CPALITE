name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    container: golang:1.24-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux amd64 plugin
        run: |
          mkdir -p dist
          VER="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/grok-manager-linux-amd64.so \
            .
          cp dist/grok-manager-linux-amd64.so dist/grok-manager.so
          cp dist/grok-manager-linux-amd64.so "dist/grok-manager-v${VER}.so"
          sha256sum dist/grok-manager-linux-amd64.so dist/grok-manager.so "dist/grok-manager-v${VER}.so" > dist/SHA256SUMS-linux-amd64

      - name: Upload Linux amd64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            dist/grok-manager-linux-amd64.so
            dist/grok-manager.so
            dist/grok-manager-v*.so
            dist/SHA256SUMS-linux-amd64

  # Native arm64 runner (public repos). Avoids fragile CGO cross-link issues.
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc g++

      - name: Build Linux arm64 plugin
        run: |
          mkdir -p dist
          VER="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/grok-manager-linux-arm64.so \
            .
          cp dist/grok-manager-linux-arm64.so "dist/grok-manager-v${VER}-linux-arm64.so"
          sha256sum dist/grok-manager-linux-arm64.so "dist/grok-manager-v${VER}-linux-arm64.so" > dist/SHA256SUMS-linux-arm64
          file dist/grok-manager-linux-arm64.so

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            dist/grok-manager-linux-arm64.so
            dist/grok-manager-v*-linux-arm64.so
            dist/SHA256SUMS-linux-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install MinGW
        shell: bash
        run: choco install mingw -y --no-progress

      - name: Build Windows amd64 plugin
        shell: bash
        run: |
          export PATH="/c/ProgramData/mingw64/mingw64/bin:/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin:$PATH"
          export CGO_ENABLED=1
          export CC=gcc
          mkdir -p dist
          VER="${GITHUB_REF_NAME#v}"
          go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/grok-manager-windows-amd64.dll \
            .
          cp dist/grok-manager-windows-amd64.dll dist/grok-manager.dll
          cp dist/grok-manager-windows-amd64.dll "dist/grok-manager-v${VER}.dll"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            dist/grok-manager-windows-amd64.dll
            dist/grok-manager.dll
            dist/grok-manager-v*.dll

  publish:
    needs: [build-linux-amd64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p dist
          find artifacts -type f -print
          cp artifacts/linux-amd64/* dist/ 2>/dev/null || true
          cp artifacts/linux-arm64/* dist/ 2>/dev/null || true
          cp artifacts/windows-amd64/* dist/ 2>/dev/null || true
          cat dist/SHA256SUMS-linux-* > dist/SHA256SUMS 2>/dev/null || true
          ls -lah dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            dist/grok-manager-linux-amd64.so
            dist/grok-manager-linux-arm64.so
            dist/grok-manager.so
            dist/grok-manager-v*.so
            dist/grok-manager-v*-linux-arm64.so
            dist/grok-manager-windows-amd64.dll
            dist/grok-manager.dll
            dist/grok-manager-v*.dll
            dist/SHA256SUMS
            dist/SHA256SUMS-linux-amd64
            dist/SHA256SUMS-linux-arm64
